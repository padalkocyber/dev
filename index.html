<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ПАДАЛКО ЛУЧШИЙ — МЕГА-УЛЁТНЫЙ ФАН</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* чтобы не выделялся текст при кликах */
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Arial Black', 'Impact', system-ui, sans-serif;
      overflow: hidden;
      position: relative;
      cursor: crosshair;
    }

    /* главный контейнер с динамическими эффектами */
    .hero {
      position: relative;
      z-index: 20;
      text-align: center;
      animation: floatGlow 2s ease-in-out infinite alternate;
      transform-origin: center;
    }

    /* основной титул с безумной анимацией */
    .glitch-title {
      font-size: clamp(2.8rem, 14vw, 9rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, #ffff00, #ff00cc, #00ffff, #ffaa00);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: gradientShift 1.2s infinite, textPulse 0.3s infinite alternate;
      text-shadow: 0 0 5px #ff00ff, 0 0 15px cyan, 0 0 25px yellow;
      position: relative;
      display: inline-block;
      white-space: nowrap;
      transition: all 0.2s;
    }

    /* эффект глитча (псевдоэлементы) */
    .glitch-title::before,
    .glitch-title::after {
      content: "ПАДАЛКО ЛУЧШИЙ";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #ffff00, #ff00cc, #00ffff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      opacity: 0.7;
      pointer-events: none;
    }

    .glitch-title::before {
      animation: glitchAnim 0.18s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
      z-index: -1;
      left: 4px;
      text-shadow: -2px 0 red;
    }

    .glitch-title::after {
      animation: glitchAnim2 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) reverse infinite;
      z-index: -2;
      left: -4px;
      text-shadow: 2px 0 cyan;
    }

    /* неоновая рамка + пульсация */
    .neon-border {
      display: inline-block;
      padding: 0.5rem 2rem;
      border-radius: 80px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      box-shadow: 0 0 15px #ff00cc, 0 0 30px #00ffff, inset 0 0 20px rgba(255, 255, 0, 0.5);
      animation: borderPulse 0.8s infinite alternate;
      transition: transform 0.2s;
    }

    /* доп текст-подпись */
    .tagline {
      margin-top: 2rem;
      font-size: 1.2rem;
      font-weight: bold;
      letter-spacing: 4px;
      background: rgba(0, 0, 0, 0.6);
      display: inline-block;
      padding: 0.5rem 1.8rem;
      border-radius: 60px;
      backdrop-filter: blur(10px);
      color: #fff9c4;
      text-shadow: 0 0 8px magenta, 0 0 5px cyan;
      font-family: monospace;
      animation: flicker 1.2s infinite;
      border: 1px solid rgba(255, 255, 0, 0.6);
    }

    /* кнопка-пати хардкор */
    .party-btn {
      margin-top: 2rem;
      background: linear-gradient(45deg, gold, fuchsia);
      border: none;
      padding: 12px 28px;
      font-size: 1.3rem;
      font-weight: bold;
      font-family: inherit;
      border-radius: 60px;
      color: #111;
      cursor: pointer;
      box-shadow: 0 0 15px #ffaa44, 0 0 30px hotpink;
      transition: 0.1s linear;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: btnWobble 0.5s infinite alternate;
    }

    .party-btn:active {
      transform: scale(0.96);
      filter: brightness(1.2);
    }

    /* холст для частиц, конфетти, звёзд */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
      z-index: 30;
    }

    /* задний шум/рябь (эффект искажения) */
    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-radial-gradient(circle at 20% 40%, rgba(0,255,255,0.08) 0px, rgba(255,0,200,0.05) 2px, transparent 4px);
      pointer-events: none;
      z-index: 10;
      mix-blend-mode: overlay;
      animation: noiseShift 0.2s steps(3) infinite;
    }

    /* плавающие "лазерные" линии */
    .laser-rays {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, transparent 45%, cyan 48%, magenta 52%, transparent 55%);
      background-size: 300% 300%;
      animation: laserMove 4s linear infinite;
      opacity: 0.2;
      pointer-events: none;
      z-index: 5;
      mix-blend-mode: screen;
    }

    /* Анимации */
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    @keyframes textPulse {
      0% { text-shadow: 0 0 3px #ff00ff, 0 0 8px cyan; letter-spacing: 0.12em; }
      100% { text-shadow: 0 0 20px yellow, 0 0 30px fuchsia; letter-spacing: 0.2em; }
    }

    @keyframes glitchAnim {
      0% { transform: skew(0deg, 0deg); opacity: 0.7; }
      20% { transform: skew(2deg, -1deg); opacity: 1; }
      40% { transform: skew(-2deg, 1deg); opacity: 0.8; }
      60% { transform: skew(1deg, -0.5deg); }
      80% { transform: skew(-1deg, 0.5deg); }
      100% { transform: skew(0deg, 0deg); }
    }

    @keyframes glitchAnim2 {
      0% { transform: skew(0deg, 0deg); opacity: 0.6; }
      25% { transform: skew(-2deg, 1deg); opacity: 0.9; }
      50% { transform: skew(1deg, -1deg); }
      75% { transform: skew(-1deg, 0.5deg); }
      100% { transform: skew(0deg, 0deg); }
    }

    @keyframes borderPulse {
      0% { box-shadow: 0 0 5px #ff44ff, 0 0 15px cyan, inset 0 0 8px yellow; }
      100% { box-shadow: 0 0 25px #ff66ff, 0 0 45px #0ff, inset 0 0 20px rgb(255, 215, 0); }
    }

    @keyframes floatGlow {
      0% { transform: translateY(0px) scale(1); filter: drop-shadow(0 0 5px magenta); }
      100% { transform: translateY(-12px) scale(1.02); filter: drop-shadow(0 0 20px cyan); }
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; text-shadow: 0 0 2px cyan; }
      25% { opacity: 0.9; text-shadow: 0 0 12px magenta; letter-spacing: 5px; }
      75% { opacity: 1; text-shadow: 0 0 5px lime; }
    }

    @keyframes btnWobble {
      0% { transform: rotate(0deg) scale(1); }
      100% { transform: rotate(1deg) scale(1.03); background-position: 100% 0; }
    }

    @keyframes noiseShift {
      0% { transform: translate(0, 0); opacity: 0.4; }
      100% { transform: translate(2px, -2px); opacity: 0.7; }
    }

    @keyframes laserMove {
      0% { background-position: 0% 0%; }
      100% { background-position: 100% 100%; }
    }

    /* аудио-виджет маленький */
    .audio-badge {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      padding: 8px 14px;
      border-radius: 60px;
      font-size: 12px;
      color: white;
      font-family: monospace;
      z-index: 50;
      border: 1px solid lime;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .audio-badge:hover {
      background: black;
      border-color: fuchsia;
      box-shadow: 0 0 12px magenta;
    }

    /* эффект при клике на титул */
    .shake-super {
      animation: screenShake 0.2s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    @keyframes screenShake {
      0% { transform: translate(1px, 1px); }
      10% { transform: translate(-2px, -2px); }
      20% { transform: translate(2px, 0px); }
      30% { transform: translate(-1px, 2px); }
      40% { transform: translate(1px, -1px); }
      50% { transform: translate(-2px, 1px); }
      100% { transform: translate(0,0); }
    }

    /* адаптив */
    @media (max-width: 640px) {
      .glitch-title {
        font-size: 2.4rem;
        letter-spacing: 0.1em;
        white-space: normal;
        word-break: keep-all;
      }
      .neon-border {
        padding: 0.2rem 1rem;
      }
      .tagline {
        font-size: 0.8rem;
      }
      .party-btn {
        font-size: 1rem;
        padding: 8px 20px;
      }
    }

    /* индикатор басов */
    .bass-buddy {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: radial-gradient(circle, #ff44cc, #2200aa);
      filter: blur(8px);
      opacity: 0.5;
      z-index: 40;
      pointer-events: none;
      animation: bassPump 0.6s infinite alternate;
    }

    @keyframes bassPump {
      0% { transform: scale(0.8); opacity: 0.3; background: cyan; }
      100% { transform: scale(1.5); opacity: 0.8; background: fuchsia; }
    }
  </style>
</head>
<body>

  <div class="laser-rays"></div>
  <div class="noise-overlay"></div>
  <div class="bass-buddy"></div>

  <div class="hero">
    <div class="neon-border">
      <h1 class="glitch-title">ПАДАЛКО ЛУЧШИЙ</h1>
    </div>
    <div class="tagline">
      ⚡ АБСОЛЮТНЫЙ ЧЕМПИОН ⚡
    </div>
    <button class="party-btn" id="boomButton">💥 ЗАЖГИ ТОТАЛ 💥</button>
  </div>

  <canvas id="canvasConfetti"></canvas>

  <div id="audioControl" class="audio-badge">
    🔊 ВКЛ МУЗЫКУ
  </div>

  <script>
    (function() {
      // ========== 1. КОНФЕТТИ И ЧАСТИЦЫ (продвинутая система) ==========
      const canvas = document.getElementById('canvasConfetti');
      const ctx = canvas.getContext('2d');
      let width = window.innerWidth;
      let height = window.innerHeight;
      let particles = [];
      let animationId = null;
      let confettiActive = false;

      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      class ConfettiParticle {
        constructor(x, y, vx, vy, size, color, life, shape = 'circle') {
          this.x = x;
          this.y = y;
          this.vx = vx;
          this.vy = vy;
          this.size = size;
          this.color = color;
          this.life = life;
          this.maxLife = life;
          this.shape = shape;
          this.rotation = Math.random() * Math.PI * 2;
          this.rotSpeed = (Math.random() - 0.5) * 0.2;
        }
        update(gravity = 0.2, drag = 0.98) {
          this.vx *= drag;
          this.vy += gravity;
          this.vy *= drag;
          this.x += this.vx;
          this.y += this.vy;
          this.life -= 1;
          this.rotation += this.rotSpeed;
          return this.life > 0 && this.y < height + 200 && this.x > -200 && this.x < width + 200;
        }
        draw(ctx) {
          const opacity = Math.min(1, this.life / this.maxLife * 1.2);
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.rotation);
          ctx.globalAlpha = opacity;
          ctx.fillStyle = this.color;
          if (this.shape === 'rect') {
            ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size * 0.7);
          } else if (this.shape === 'star') {
            ctx.beginPath();
            const spikes = 5;
            const outerR = this.size;
            const innerR = this.size * 0.5;
            for (let i = 0; i < spikes * 2; i++) {
              const radius = i % 2 === 0 ? outerR : innerR;
              const angle = (Math.PI * 2 * i) / (spikes * 2);
              const xPos = Math.cos(angle) * radius;
              const yPos = Math.sin(angle) * radius;
              if (i === 0) ctx.moveTo(xPos, yPos);
              else ctx.lineTo(xPos, yPos);
            }
            ctx.closePath();
            ctx.fill();
          } else {
            ctx.beginPath();
            ctx.arc(0, 0, this.size * 0.8, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }
      }

      function burstConfetti(x, y, intensity = 1.2) {
        const count = Math.floor(60 * intensity);
        const colors = ['#FFD966', '#FF6B6B', '#6BCB77', '#4D96FF', '#FF6AC2', '#F9F3B0', '#C084FC', '#00FFFF', '#FF44CC', '#FFFF00'];
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 6 + 2;
          const vx = Math.cos(angle) * speed * (Math.random() * 1.5);
          const vy = Math.sin(angle) * speed * (Math.random() * 1.2 + 1);
          const size = Math.random() * 9 + 4;
          const color = colors[Math.floor(Math.random() * colors.length)];
          const life = 100 + Math.random() * 70;
          const shapeChoice = Math.random() > 0.6 ? (Math.random() > 0.5 ? 'star' : 'rect') : 'circle';
          particles.push(new ConfettiParticle(x, y, vx, vy, size, color, life, shapeChoice));
        }
        // дополнительные случайные брызги
        for (let i = 0; i < count * 0.6; i++) {
          const xOff = (Math.random() - 0.5) * 300;
          const yOff = (Math.random() - 0.5) * 200;
          const angle2 = Math.random() * Math.PI * 2;
          const speed2 = Math.random() * 7;
          particles.push(new ConfettiParticle(x + xOff, y + yOff, Math.cos(angle2)*speed2, Math.sin(angle2)*speed2 - 2, Math.random()*7+3, colors[Math.floor(Math.random()*colors.length)], 80 + Math.random()*60, 'circle'));
        }
      }

      function fullScreenFirework() {
        for (let i = 0; i < 5; i++) {
          setTimeout(() => {
            const randX = Math.random() * width;
            const randY = Math.random() * height * 0.7 + 50;
            burstConfetti(randX, randY, 0.9);
          }, i * 80);
        }
        // центральный эпичный взрыв
        burstConfetti(width/2, height/2, 2.2);
        burstConfetti(width/2 + 40, height/2 - 30, 1.5);
      }

      function startAnimationLoop() {
        if (animationId) cancelAnimationFrame(animationId);
        function drawFrame() {
          if (!ctx) return;
          ctx.clearRect(0, 0, width, height);
          let activeParticles = false;
          for (let i = particles.length-1; i >= 0; i--) {
            const alive = particles[i].update(0.18, 0.97);
            particles[i].draw(ctx);
            if (alive) activeParticles = true;
            else particles.splice(i,1);
          }
          if (activeParticles || confettiActive) {
            animationId = requestAnimationFrame(drawFrame);
          } else {
            cancelAnimationFrame(animationId);
            animationId = null;
          }
        }
        if (animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(drawFrame);
      }

      // триггеры конфетти
      function megaParty() {
        fullScreenFirework();
        // двойной взрыв спустя 0.2
        setTimeout(() => {
          for(let i=0;i<3;i++) {
            burstConfetti(width * Math.random(), height * Math.random(), 0.8);
          }
        }, 200);
        // вибрация если поддерживается
        if (navigator.vibrate) navigator.vibrate(200);
        // добавим тряску экрана на секунду
        document.body.classList.add('shake-super');
        setTimeout(() => document.body.classList.remove('shake-super'), 300);
        // дополнительная вспышка
        const flashDiv = document.createElement('div');
        flashDiv.style.position = 'fixed';
        flashDiv.style.top = 0;
        flashDiv.style.left = 0;
        flashDiv.style.width = '100%';
        flashDiv.style.height = '100%';
        flashDiv.style.backgroundColor = 'white';
        flashDiv.style.pointerEvents = 'none';
        flashDiv.style.zIndex = 9999;
        flashDiv.style.mixBlendMode = 'overlay';
        flashDiv.style.opacity = '0.6';
        document.body.appendChild(flashDiv);
        setTimeout(() => flashDiv.remove(), 150);
      }

      // кнопка мега пати
      const partyBtn = document.getElementById('boomButton');
      partyBtn.addEventListener('click', () => {
        megaParty();
        // также запускаем постоянный "дождь" из искр на 2 секунды (дополнительно)
        let interval = setInterval(() => {
          if (Math.random() > 0.6) {
            burstConfetti(Math.random() * width, Math.random() * height * 0.8 + 20, 0.5);
          }
        }, 180);
        setTimeout(() => clearInterval(interval), 1500);
      });

      // клик по самому титулу тоже вызывает конфетти
      const titleElem = document.querySelector('.glitch-title');
      if(titleElem) {
        titleElem.addEventListener('click', (e) => {
          const rect = titleElem.getBoundingClientRect();
          const centerX = rect.left + rect.width/2;
          const centerY = rect.top + rect.height/2;
          burstConfetti(centerX, centerY, 1.3);
          megaParty(); // двойной эффект
        });
      }

      startAnimationLoop();

      // ========== 2. ЗВУКОВАЯ ФИШКА (синтезатор веселья) ==========
      let audioCtx = null;
      let isAudioEnabled = false;
      let currentOsc = null;
      let audioBadge = document.getElementById('audioControl');

      function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      function playShortBeep(freq = 880, duration = 0.12, type = 'sine', volume = 0.2) {
        if (!audioCtx || !isAudioEnabled) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.start();
        osc.stop(now + duration);
      }

      function playPartyStab() {
        if (!isAudioEnabled) return;
        playShortBeep(523, 0.08, 'square', 0.15);
        playShortBeep(659, 0.1, 'sawtooth', 0.12);
        playShortBeep(784, 0.15, 'triangle', 0.1);
        setTimeout(() => playShortBeep(1046, 0.2, 'sine', 0.08), 50);
      }

      // при клике на любую конфетти-ивенту добавляем звук (через прокси)
      const originalBurst = burstConfetti;
      window.burstConfetti = burstConfetti; // сохраняем

      function enhancedBurst(x,y,intensity=1) {
        originalBurst(x,y,intensity);
        if(isAudioEnabled && audioCtx) {
          playShortBeep(440 + Math.random() * 400, 0.07, 'sine', 0.08);
        }
      }
      // переопределяем
      window.burstConfetti = enhancedBurst;
      burstConfetti = enhancedBurst;

      audioBadge.addEventListener('click', async () => {
        if (!audioCtx) {
          initAudio();
        }
        if (audioCtx && !isAudioEnabled) {
          await audioCtx.resume();
          isAudioEnabled = true;
          audioBadge.innerHTML = '🎧 МУЗЫКА АКТИВНА 🎧';
          audioBadge.style.borderColor = '#ff44ff';
          // проиграть приветственную мелодию
          playShortBeep(660, 0.1, 'square', 0.1);
          playShortBeep(880, 0.15, 'sawtooth', 0.12);
          setTimeout(() => {
            if(isAudioEnabled) playShortBeep(523, 0.2, 'triangle', 0.1);
          }, 100);
        } else if (isAudioEnabled) {
          // если выключить
          isAudioEnabled = false;
          audioBadge.innerHTML = '🔇 МУЗЫКА ВЫКЛ';
          audioBadge.style.borderColor = 'gray';
        } else {
          await audioCtx?.resume();
          isAudioEnabled = true;
          audioBadge.innerHTML = '🎧 МУЗЫКА АКТИВНА 🎧';
          audioBadge.style.borderColor = '#ff44ff';
          playShortBeep(880,0.1);
        }
      });

      // добавим случайные искры при движении мыши (для вау-эффекта)
      let lastMove = 0;
      window.addEventListener('mousemove', (e) => {
        if (Date.now() - lastMove > 220) {
          lastMove = Date.now();
          if (Math.random() > 0.7) {
            burstConfetti(e.clientX, e.clientY, 0.3);
            if(isAudioEnabled && Math.random()>0.8) playShortBeep(300+Math.random()*500, 0.05, 'sine', 0.04);
          }
        }
      });

      // также автоматический фоновый ритмичный бас (опционально)
      let bassInterval = null;
      function startBackgroundBass() {
        if(bassInterval) clearInterval(bassInterval);
        bassInterval = setInterval(() => {
          if(isAudioEnabled && audioCtx && Math.random() > 0.75) {
            playShortBeep(80, 0.1, 'sine', 0.05);
          }
        }, 800);
      }
      startBackgroundBass();

      // при загрузке маленький приветственный конфетти-дождь
      setTimeout(() => {
        burstConfetti(width/2, height/2, 1.2);
        burstConfetti(width/2 - 100, height/3, 0.7);
      }, 300);
      setInterval(() => {
        if(Math.random() > 0.85) {
          burstConfetti(Math.random() * width, Math.random() * height * 0.6, 0.4);
        }
      }, 2800);

      // эффект магии: смена цвета фона через CSS-переменные (анимация безумия)
      let hue = 0;
      setInterval(() => {
        hue = (hue + 2) % 360;
        document.body.style.background = `radial-gradient(circle at 30% 40%, hsl(${hue}, 90%, 55%), hsl(${hue + 40}, 80%, 15%))`;
      }, 180);
    })();
  </script>
</body>
</html>
